{% extends "admin/dashboard_base.html" %}

{% block title %}Employee Time Rules · Attendance{% endblock %}

{% block admin_content %}
<section class="card table-card">
  <h1 class="page-title">Time rules</h1>
  <p class="muted">Reporting and checkout times are global for all employees.</p>
  <form method="post" action="{% url 'admin_time_rules_page' %}" class="filter-bar">
    {% csrf_token %}
    <input type="hidden" name="action" value="set_global_times">
    <div>
      <label for="global_report_time">Global reporting time (all employees)</label>
      <input
        id="global_report_time"
        type="time"
        name="report_time"
        value="{% if global_report_time %}{{ global_report_time|time:'H:i' }}{% else %}09:00{% endif %}"
        required
      >
    </div>
    <div>
      <label for="global_checkout_time">Global checkout time (all employees)</label>
      <input
        id="global_checkout_time"
        type="time"
        name="checkout_time"
        value="{% if global_checkout_time %}{{ global_checkout_time|time:'H:i' }}{% else %}17:00{% endif %}"
        required
      >
    </div>
    <button type="submit" class="btn btn--primary">Save global times</button>
  </form>
</section>
{% endblock %}
